<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Catégories — WYK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700;9..40,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFAF8;--surface:#FFFFFF;--s2:#F5F5F3;--s3:#EDEDE9;
  --red:#E8192C;--red-d:#C0111F;--red-s:rgba(232,25,44,.08);
  --text:#0F0F0E;--t2:#44443C;--t3:#8A8A82;
  --bdr:rgba(0,0,0,.07);--bdr2:rgba(0,0,0,.13);
  --sh1:0 2px 8px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);
  --sh2:0 4px 20px rgba(0,0,0,.09),0 1px 4px rgba(0,0,0,.05);
  --sh3:0 16px 48px rgba(0,0,0,.13),0 4px 12px rgba(0,0,0,.07);
  --glass:rgba(250,250,248,.9);--gbdr:rgba(0,0,0,.06);
  --blur:blur(24px);--r:16px;--rl:22px;
  --ease:.22s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"]{
  --bg:#0D0D0C;--surface:#161615;--s2:#1E1E1C;--s3:#262624;
  --text:#F2F2EC;--t2:#A0A098;--t3:#64645C;
  --bdr:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.13);
  --sh1:0 2px 8px rgba(0,0,0,.3),0 1px 3px rgba(0,0,0,.18);
  --sh2:0 4px 20px rgba(0,0,0,.42),0 1px 4px rgba(0,0,0,.22);
  --sh3:0 16px 48px rgba(0,0,0,.58),0 4px 12px rgba(0,0,0,.3);
  --glass:rgba(13,13,12,.9);--gbdr:rgba(255,255,255,.07);
  --red-s:rgba(232,25,44,.13);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;padding-bottom:72px}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
svg{display:block;flex-shrink:0}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:90;
  background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid var(--gbdr);
  height:58px;display:flex;align-items:center;
  justify-content:space-between;padding:0 16px;
}
.h-left{display:flex;align-items:center;gap:8px}
.back-btn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text);transition:background var(--ease)}
.back-btn:hover{background:var(--s2)}
.back-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--text);letter-spacing:-.03em}
.logo em{font-style:normal;color:var(--red)}
.h-right{display:flex;align-items:center;gap:1px}
.hbtn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text);transition:background var(--ease);position:relative}
.hbtn:hover{background:var(--s2)}
.hbtn svg{width:18px;height:18px;stroke-width:1.8;stroke:currentColor;fill:none}
.cart-badge{position:absolute;top:5px;right:5px;width:14px;height:14px;border-radius:50%;background:var(--red);color:#fff;font-size:.48rem;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--surface)}
.theme-btn{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text);transition:background var(--ease),transform var(--ease)}
.theme-btn:hover{background:var(--s2);transform:rotate(18deg)}
.theme-btn svg{width:16px;height:16px;stroke-width:1.8;stroke:currentColor;fill:none}
.icon-sun{display:block}[data-theme="dark"] .icon-sun{display:none}
.icon-moon{display:none}[data-theme="dark"] .icon-moon{display:block}

/* ── PROMO BANNER (admin géré) ── */
.promo-banner{
  background:linear-gradient(135deg,#c91222,#ff3d50 55%,#ff6b6b);
  padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  position:relative;overflow:hidden;
}
.promo-banner::before{content:'';position:absolute;right:-10px;top:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.08)}
.promo-banner::after{content:'';position:absolute;left:30px;bottom:-25px;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.06)}
.pb-content{display:flex;align-items:center;gap:9px;position:relative;z-index:1}
.pb-ico{width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pb-ico svg{width:14px;height:14px;stroke:#fff;stroke-width:2;fill:none}
.pb-text{font-size:.78rem;font-weight:700;color:#fff;line-height:1.3}
.pb-text span{font-size:.66rem;font-weight:500;color:rgba(255,255,255,.7);display:block;margin-top:1px}
.pb-countdown{
  display:flex;align-items:center;gap:4px;
  background:rgba(0,0,0,.2);border-radius:8px;padding:5px 9px;
  flex-shrink:0;position:relative;z-index:1;
}
.pb-countdown span{font-family:'Syne',sans-serif;font-size:.78rem;font-weight:800;color:#fff}
.pb-countdown .sep{color:rgba(255,255,255,.5);font-size:.7rem}
.pb-cta{background:#fff;color:var(--red);padding:6px 12px;border-radius:8px;font-weight:800;font-size:.72rem;flex-shrink:0;position:relative;z-index:1;transition:transform var(--ease)}
.pb-cta:hover{transform:scale(1.05)}

/* ── SEARCH BAR ── */
.search-wrap{padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--bdr)}
.search-bar{display:flex;align-items:center;gap:9px;background:var(--s2);border:1.5px solid var(--bdr);border-radius:13px;padding:11px 14px;transition:border-color var(--ease),box-shadow var(--ease)}
.search-bar:focus-within{border-color:var(--red);box-shadow:0 0 0 3px var(--red-s);background:var(--surface)}
.search-bar svg{width:16px;height:16px;stroke:var(--t3);stroke-width:2;fill:none;flex-shrink:0;transition:stroke var(--ease)}
.search-bar:focus-within svg{stroke:var(--red)}
.search-bar input{flex:1;background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text)}
.search-bar input::placeholder{color:var(--t3)}
.search-clear{color:var(--t3);transition:color var(--ease);display:none}
.search-clear.show{display:block}
.search-clear svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none}

/* ── FILTER CHIPS ── */
.filter-scroll{display:flex;gap:7px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--bdr)}
.filter-scroll::-webkit-scrollbar{display:none}
.fchip{display:inline-flex;align-items:center;gap:5px;background:var(--s2);border:1.5px solid var(--bdr);border-radius:100px;padding:6px 13px;font-size:.76rem;font-weight:600;color:var(--t2);white-space:nowrap;cursor:pointer;flex-shrink:0;transition:all var(--ease)}
.fchip svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none}
.fchip:hover{border-color:var(--red);color:var(--red)}
.fchip.on{background:var(--red);border-color:var(--red);color:#fff}

/* ── PAGE TITLE ── */
.page-head{padding:20px 16px 8px}
.page-head h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--text);letter-spacing:-.03em;margin-bottom:4px}
.page-head h1 em{font-style:normal;color:var(--red)}
.page-head p{font-size:.82rem;color:var(--t3)}

/* ══════════════════════════════
   CATEGORY ACCORDION
══════════════════════════════ */
.cats-list{padding:0 16px;display:flex;flex-direction:column;gap:10px}

.cat-section{
  border-radius:20px;overflow:hidden;
  border:1px solid var(--bdr);background:var(--surface);
  box-shadow:var(--sh1);
  transition:box-shadow var(--ease);
}
.cat-section.open{box-shadow:var(--sh2)}

/* Category header — clickable */
.cat-header{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;cursor:pointer;
  transition:background var(--ease);
  position:relative;
}
.cat-header:hover{background:var(--s2)}
.cat-header-ico{
  width:44px;height:44px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:transform var(--ease);
}
.cat-section.open .cat-header-ico{transform:scale(1.06)}
.cat-header-ico svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.8;fill:none}
.cat-header-info{flex:1;min-width:0}
.cat-header-name{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800;color:var(--text);letter-spacing:-.01em}
.cat-header-sub{font-size:.71rem;color:var(--t3);margin-top:2px}
.cat-count-badge{background:var(--s2);border:1px solid var(--bdr);border-radius:100px;padding:3px 10px;font-size:.65rem;font-weight:700;color:var(--t2);flex-shrink:0}
.cat-section.open .cat-count-badge{background:var(--red-s);border-color:rgba(232,25,44,.16);color:var(--red)}
.cat-chevron{color:var(--t3);flex-shrink:0;transition:transform var(--ease)}
.cat-chevron svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none}
.cat-section.open .cat-chevron{transform:rotate(180deg)}

/* Products scroll inside category */
.cat-body{
  max-height:0;overflow:hidden;
  transition:max-height .38s cubic-bezier(.4,0,.2,1);
}
.cat-section.open .cat-body{max-height:1000px}
.cat-body-inner{border-top:1px solid var(--bdr);padding:14px 0 16px}

/* Horizontal product scroll */
.prod-scroll{display:flex;gap:10px;padding:0 16px;overflow-x:auto;scrollbar-width:none}
.prod-scroll::-webkit-scrollbar{display:none}

/* Product card in scroll */
.prod-card{
  width:148px;flex-shrink:0;
  background:var(--s2);border:1px solid var(--bdr);
  border-radius:16px;overflow:hidden;cursor:pointer;
  transition:transform var(--ease),box-shadow var(--ease);
}
.prod-card:hover{transform:translateY(-3px);box-shadow:var(--sh2)}
.prod-card:active{transform:scale(.97)}
.prod-img{
  width:100%;height:110px;
  background:var(--s3);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.prod-img img{width:100%;height:100%;object-fit:cover}
.prod-img-ph{display:flex;flex-direction:column;align-items:center;gap:5px}
.prod-img-ph svg{width:28px;height:28px;stroke:var(--bdr2);stroke-width:1.4;fill:none}
.prod-img-ph span{font-size:.58rem;color:var(--t3);font-weight:600}
.prod-badge{position:absolute;top:7px;left:7px;border-radius:6px;padding:2px 7px;font-size:.58rem;font-weight:800;letter-spacing:.04em}
.badge-new{background:var(--red);color:#fff}
.badge-promo{background:#f59e0b;color:#fff}
.badge-pop{background:#8b5cf6;color:#fff}
.prod-body{padding:9px 10px 10px}
.prod-name{font-size:.78rem;font-weight:700;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-price{font-family:'Syne',sans-serif;font-size:.85rem;font-weight:800;color:var(--red)}
.prod-old{font-size:.65rem;color:var(--t3);text-decoration:line-through;margin-left:4px}

/* See all link */
.cat-see-all{display:flex;align-items:center;justify-content:center;gap:5px;margin:10px 16px 0;padding:10px;border-radius:11px;background:var(--s2);border:1px solid var(--bdr);font-size:.78rem;font-weight:700;color:var(--t2);cursor:pointer;transition:all var(--ease)}
.cat-see-all:hover{border-color:var(--red);color:var(--red);background:var(--red-s)}
.cat-see-all svg{width:13px;height:13px;stroke:currentColor;stroke-width:2.5;fill:none}

/* Empty state */
.cat-empty{display:flex;flex-direction:column;align-items:center;padding:28px 16px;text-align:center}
.cat-empty svg{width:32px;height:32px;stroke:var(--bdr2);stroke-width:1.4;fill:none;margin-bottom:8px}
.cat-empty p{font-size:.77rem;color:var(--t3)}

/* ══════════════════════════════
   PRODUCT POPUP — grand format
══════════════════════════════ */
.pop-ov{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .26s;
}
.pop-ov.on{opacity:1;pointer-events:all}

.pop-sheet{
  background:var(--surface);
  border-radius:28px 28px 0 0;
  width:100%;max-width:620px;
  max-height:96vh;
  overflow-y:auto;scrollbar-width:none;
  transform:translateY(100%);
  transition:transform .34s cubic-bezier(.32,0,.18,1);
  box-shadow:0 -16px 60px rgba(0,0,0,.18);
  position:relative;
}
.pop-sheet::-webkit-scrollbar{display:none}
.pop-ov.on .pop-sheet{transform:translateY(0)}

.pop-handle{width:36px;height:4px;border-radius:2px;background:var(--bdr2);margin:13px auto 0}

/* Close button */
.pop-close{
  position:absolute;top:13px;right:14px;z-index:10;
  width:30px;height:30px;border-radius:50%;
  background:var(--s2);border:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:center;
  transition:background var(--ease);
}
.pop-close:hover{background:var(--s3)}
.pop-close svg{width:13px;height:13px;stroke:var(--t2);stroke-width:2.5;fill:none}

/* Image gallery */
.pop-gallery{margin:12px 14px 0;position:relative;border-radius:20px;overflow:hidden;background:var(--s2)}
.pop-gallery-track{display:flex;transition:transform .36s cubic-bezier(.4,0,.2,1)}
.pop-gallery-slide{min-width:100%;height:220px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.pop-gallery-slide img{width:100%;height:100%;object-fit:cover}
.pop-gallery-ph{display:flex;flex-direction:column;align-items:center;gap:8px}
.pop-gallery-ph svg{width:40px;height:40px;stroke:var(--bdr2);stroke-width:1.3;fill:none}
.pop-gallery-ph span{font-size:.72rem;color:var(--t3);font-weight:600}

/* Gallery nav */
.gallery-prev,.gallery-next{
  position:absolute;top:50%;transform:translateY(-50%);
  width:32px;height:32px;border-radius:50%;
  background:var(--glass);backdrop-filter:blur(10px);
  border:1px solid var(--gbdr);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:5;
  color:var(--text);box-shadow:var(--sh1);
  transition:all var(--ease);
}
.gallery-prev{left:10px}.gallery-next{right:10px}
.gallery-prev:hover,.gallery-next:hover{background:var(--surface);box-shadow:var(--sh2)}
.gallery-prev svg,.gallery-next svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.5;fill:none}
.gallery-dots{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
.gdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);transition:all var(--ease);cursor:pointer}
.gdot.on{background:#fff;width:18px;border-radius:3px}

/* Download button */
.pop-dl{
  position:absolute;bottom:10px;right:10px;
  background:rgba(0,0,0,.35);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.15);
  border-radius:9px;padding:6px 11px;
  display:flex;align-items:center;gap:5px;
  font-size:.68rem;font-weight:700;color:#fff;
  cursor:pointer;transition:background var(--ease);
}
.pop-dl:hover{background:rgba(0,0,0,.55)}
.pop-dl svg{width:13px;height:13px;stroke:#fff;stroke-width:2;fill:none}

/* Pop content */
.pop-content{padding:14px 18px 0}

/* Header row */
.pop-header-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:4px}
.pop-cat-badge{display:inline-flex;align-items:center;gap:5px;background:var(--red-s);border:1px solid rgba(232,25,44,.14);border-radius:100px;padding:3px 10px;font-size:.65rem;font-weight:700;color:var(--red)}
.pop-status{display:inline-flex;align-items:center;gap:4px;font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:100px}
.status-ok{background:rgba(34,197,94,.1);color:#16a34a}
.status-low{background:rgba(245,158,11,.1);color:#d97706}
.status-out{background:rgba(239,68,68,.1);color:#ef4444}
.pop-status svg{width:10px;height:10px;stroke:currentColor;stroke-width:2.5;fill:none}

.pop-title{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;color:var(--text);letter-spacing:-.02em;margin-bottom:6px}
.pop-price-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pop-price{font-family:'Syne',sans-serif;font-size:1.45rem;font-weight:800;color:var(--red)}
.pop-old-price{font-size:.86rem;color:var(--t3);text-decoration:line-through}
.pop-discount{background:rgba(34,197,94,.12);color:#16a34a;border-radius:6px;padding:2px 8px;font-size:.68rem;font-weight:800}

.pop-desc{font-size:.83rem;color:var(--t2);line-height:1.72;margin-bottom:14px}

/* Specs grid */
.pop-specs-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:8px}
.pop-specs-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.spec-item{background:var(--s2);border:1px solid var(--bdr);border-radius:11px;padding:9px 11px}
.spec-lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);margin-bottom:2px}
.spec-val{font-size:.81rem;font-weight:600;color:var(--text)}

/* Colors */
.pop-colors-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:8px}
.pop-colors{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.color-opt{
  width:28px;height:28px;border-radius:50%;cursor:pointer;
  border:2.5px solid transparent;
  transition:transform var(--ease),border-color var(--ease);
  position:relative;
}
.color-opt:hover{transform:scale(1.12)}
.color-opt.on{border-color:var(--text);transform:scale(1.15)}
.color-opt.on::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--text);opacity:.3}

/* Sizes */
.pop-sizes-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:8px}
.pop-sizes{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.size-opt{padding:7px 14px;border-radius:100px;border:1.5px solid var(--bdr);color:var(--t2);font-size:.77rem;font-weight:600;cursor:pointer;transition:all var(--ease)}
.size-opt:hover,.size-opt.on{border-color:var(--red);color:var(--red);background:var(--red-s)}

/* Action buttons */
.pop-actions{display:flex;gap:8px;padding:0 18px}
.btn-cart{flex:1;background:var(--red);color:#fff;padding:14px;border-radius:14px;font-weight:700;font-size:.9rem;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 4px 16px rgba(232,25,44,.24);transition:background var(--ease),transform var(--ease)}
.btn-cart svg{width:17px;height:17px;stroke:#fff;stroke-width:2.2;fill:none}
.btn-cart:hover{background:var(--red-d);transform:translateY(-1px)}
.btn-wish{width:50px;height:50px;border-radius:14px;background:var(--s2);border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;transition:all var(--ease)}
.btn-wish svg{width:18px;height:18px;stroke:var(--t2);stroke-width:2;fill:none}
.btn-wish:hover{border-color:var(--red);background:var(--red-s)}
.btn-wish:hover svg{stroke:var(--red)}
.btn-wish.on svg{stroke:var(--red);fill:var(--red)}

.btn-wa{
  display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;background:#25D366;color:#fff;
  padding:13px;border-radius:14px;font-weight:700;font-size:.9rem;
  margin:8px 0 0;
  box-shadow:0 4px 14px rgba(37,211,102,.2);
  transition:transform var(--ease),box-shadow var(--ease);
}
.btn-wa svg{width:17px;height:17px}
.btn-wa:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,211,102,.35)}
.pop-wa-wrap{padding:0 18px}

/* Divider */
.pop-divider{height:1px;background:var(--bdr);margin:18px 18px 0}

/* Similar products */
.pop-similar{padding:14px 18px 30px}
.pop-similar-title{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:800;color:var(--text);letter-spacing:-.01em;margin-bottom:12px}
.pop-similar-title em{color:var(--red);font-style:normal}
.similar-scroll{display:flex;gap:9px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.similar-scroll::-webkit-scrollbar{display:none}
.sim-card{
  width:130px;flex-shrink:0;
  background:var(--s2);border:1px solid var(--bdr);
  border-radius:14px;overflow:hidden;cursor:pointer;
  transition:transform var(--ease),box-shadow var(--ease);
}
.sim-card:hover{transform:translateY(-2px);box-shadow:var(--sh1)}
.sim-img{width:100%;height:90px;background:var(--s3);display:flex;align-items:center;justify-content:center;overflow:hidden}
.sim-img img{width:100%;height:100%;object-fit:cover}
.sim-img svg{width:24px;height:24px;stroke:var(--bdr2);stroke-width:1.4;fill:none}
.sim-body{padding:8px 9px 9px}
.sim-name{font-size:.73rem;font-weight:700;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sim-price{font-family:'Syne',sans-serif;font-size:.78rem;font-weight:800;color:var(--red)}

/* ── OVERLAY ── */
.ov{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity var(--ease)}
.ov.on{opacity:1;pointer-events:all}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:80;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-top:1px solid var(--gbdr);display:flex;height:58px;padding:0 6px;box-shadow:0 -2px 16px rgba(0,0,0,.06)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--t3);text-decoration:none;font-size:.55rem;font-weight:600;border-radius:11px;margin:4px 2px;transition:color var(--ease),background var(--ease)}
.bni svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.7;fill:none}
.bni:hover{color:var(--text);background:var(--s2)}
.bni.on{color:var(--red)}
.bni.on svg{stroke-width:2.2}

/* ── TOAST ── */
.toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);padding:9px 15px;border-radius:100px;font-size:.79rem;font-weight:500;opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;white-space:nowrap;z-index:500;box-shadow:var(--sh2);display:flex;align-items:center;gap:6px}
.toast svg{width:13px;height:13px;stroke:#22c55e;stroke-width:2.5;fill:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* icon colors */
.ico-r{background:#fff0f1;color:#e8192c}
.ico-b{background:#eff6ff;color:#2563eb}
.ico-y{background:#fffbeb;color:#d97706}
.ico-g{background:#f0fdf4;color:#16a34a}
.ico-p{background:#faf5ff;color:#9333ea}
.ico-t{background:#f0fdfa;color:#0d9488}
.ico-o{background:#fff7ed;color:#ea580c}
.ico-pk{background:#fdf2f8;color:#db2777}
[data-theme="dark"] .ico-r{background:rgba(232,25,44,.14)}
[data-theme="dark"] .ico-b{background:rgba(37,99,235,.14)}
[data-theme="dark"] .ico-y{background:rgba(217,119,6,.14)}
[data-theme="dark"] .ico-g{background:rgba(22,163,74,.14)}
[data-theme="dark"] .ico-p{background:rgba(147,51,234,.14)}
[data-theme="dark"] .ico-t{background:rgba(13,148,136,.14)}
[data-theme="dark"] .ico-o{background:rgba(234,88,12,.14)}
[data-theme="dark"] .ico-pk{background:rgba(219,39,119,.14)}

@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.a1{animation:fu .3s ease both}
.a2{animation:fu .3s .06s ease both}
.a3{animation:fu .3s .12s ease both}

@media(min-width:640px){

  .prod-card{width:168px}

@media(min-width:900px){

/* ── THEME ── */
function toggleTheme(){var h=document.documentElement,dark=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',dark?'light':'dark');localStorage.setItem('wyk-theme',dark?'light':'dark')}
(function(){var t=localStorage.getItem('wyk-theme');if(t)document.documentElement.setAttribute('data-theme',t)})();

/* ── TOAST ── */
var toastTimer;
function showToast(msg){var el=document.getElementById('toastEl');document.getElementById('toastMsg').textContent=msg;el.classList.add('on');clearTimeout(toastTimer);toastTimer=setTimeout(function(){el.classList.remove('on')},2400)}

/* ── CART ── */
var cartCount=0;
function addToCart(){cartCount++;document.getElementById('cartBadge').textContent=cartCount;showToast('Ajout\u00e9 au panier !');closePopup()}

/* ── FILTER ── */
var activeFilter='all';
function setFilter(btn,f){document.querySelectorAll('.fchip').forEach(function(c){c.classList.remove('on')});btn.classList.add('on');activeFilter=f;renderCats()}

/* ── SEARCH ── */
var searchVal='';
function onSearch(v){searchVal=v.toLowerCase();document.getElementById('searchClear').classList.toggle('show',v.length>0);renderCats()}
function clearSearch(){document.getElementById('searchInput').value='';searchVal='';document.getElementById('searchClear').classList.remove('show');renderCats()}
function openSearch(){document.getElementById('searchInput').focus()}

/* ══ RENDER CATEGORIES ══ */
function renderCats(){
  var list=document.getElementById('catsList');
  list.innerHTML='';
  var filtered=CATEGORIES.filter(function(cat){
    if(activeFilter!=='all'&&cat.filter!==activeFilter)return false;
    if(searchVal){
      var nameMatch=cat.name.toLowerCase().includes(searchVal);
      var prodMatch=cat.products.some(function(p){return p.name.toLowerCase().includes(searchVal)||p.desc.toLowerCase().includes(searchVal)});
      return nameMatch||prodMatch;
    }
    return true;
  });
  if(!filtered.length){list.innerHTML='<div style="text-align:center;padding:40px 20px;color:var(--t3);font-size:.84rem;">Aucune catégorie trouvée</div>';return}
  filtered.forEach(function(cat){list.appendChild(buildCatSection(cat))})
}

function buildCatSection(cat){
  var sec=document.createElement('div');
  sec.className='cat-section';
  sec.dataset.catId=cat.id;

  // Filter products by search
  var prods=searchVal?cat.products.filter(function(p){return p.name.toLowerCase().includes(searchVal)||p.desc.toLowerCase().includes(searchVal)}):cat.products;

  sec.innerHTML=
    '<div class="cat-header" onclick="toggleCat(\''+cat.id+'\')">'
      +'<div class="cat-header-ico '+cat.icoClass+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">'+cat.svg+'</svg></div>'
      +'<div class="cat-header-info">'
        +'<div class="cat-header-name">'+cat.name+'</div>'
        +'<div class="cat-header-sub">'+cat.desc+'</div>'
      +'</div>'
      +'<span class="cat-count-badge">'+prods.length+' produit'+(prods.length>1?'s':'')+'</span>'
      +'<div class="cat-chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M19 9l-7 7-7-7"/></svg></div>'
    +'</div>'
    +'<div class="cat-body">'
      +'<div class="cat-body-inner">'
        +buildProdsScroll(prods,cat)
      +'</div>'
    +'</div>';

  // Auto-open if search match
  if(searchVal)sec.classList.add('open');

  return sec;
}

function buildProdsScroll(prods,cat){
  if(!prods.length)return '<div class="cat-empty"><svg viewBox="0 0 24 24"><path stroke-linecap="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg><p>Aucun produit dans cette catégorie pour l\'instant</p></div>';

  var html='<div class="prod-scroll">';
  prods.forEach(function(p){
    var badgeHtml=p.badge?'<span class="prod-badge badge-'+p.badge+'">'+(p.badge==='new'?'NOUVEAU':p.badge==='promo'?'PROMO':'⭐')+'</span>':'';
    html+='<div class="prod-card" onclick="openProduct(\''+p.id+'\',\''+cat.id+'\')">'
      +'<div class="prod-img">'
        +(p.imgs&&p.imgs[0]?'<img src="'+p.imgs[0]+'" alt="'+p.name+'">':'<div class="prod-img-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>Photo</span></div>')
        +badgeHtml
      +'</div>'
      +'<div class="prod-body">'
        +'<div class="prod-name">'+p.name+'</div>'
        +'<div style="display:flex;align-items:center">'
          +'<span class="prod-price">'+p.price+'</span>'
          +(p.oldPrice?'<span class="prod-old">'+p.oldPrice+'</span>':'')
        +'</div>'
      +'</div>'
    +'</div>';
  });
  html+='</div>';
  return html;
}

function toggleCat(catId){
  var sec=document.querySelector('[data-cat-id="'+catId+'"]');
  if(sec)sec.classList.toggle('open');
}

/* ══ PRODUCT POPUP ══ */
var currentProduct=null;
var currentCatId=null;
var galleryIndex=0;

function openProduct(prodId,catId){
  var cat=CATEGORIES.find(function(c){return c.id===catId});
  if(!cat)return;
  var prod=cat.products.find(function(p){return p.id===prodId});
  if(!prod)return;
  currentProduct=prod;currentCatId=catId;galleryIndex=0;

  // Gallery
  buildGallery(prod);

  // Cat badge
  document.getElementById('popCatBadge').textContent=cat.name;

  // Status
  var st=document.getElementById('popStatus');
  st.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>En stock';
  st.className='pop-status status-ok';

  // Title & price
  document.getElementById('popTitle').textContent=prod.name;
  document.getElementById('popPrice').textContent=prod.price;
  var oldEl=document.getElementById('popOldPrice');
  oldEl.textContent=prod.oldPrice||'';
  var discEl=document.getElementById('popDiscount');
  if(prod.discount){discEl.textContent=prod.discount;discEl.style.display=''}else discEl.style.display='none';

  // Desc
  document.getElementById('popDesc').textContent=prod.desc||'';

  // Specs
  var sg=document.getElementById('popSpecsGrid'),ss=document.getElementById('popSpecsSec');sg.innerHTML='';
  if(prod.specs&&prod.specs.length){ss.style.display='';prod.specs.forEach(function(s){var d=document.createElement('div');d.className='spec-item';d.innerHTML='<div class="spec-lbl">'+s.l+'</div><div class="spec-val">'+s.v+'</div>';sg.appendChild(d)})}else ss.style.display='none';

  // Colors
  var cd=document.getElementById('popColors'),cs=document.getElementById('popColorsSec');cd.innerHTML='';
  if(prod.colors&&prod.colors.length){cs.style.display='';prod.colors.forEach(function(c,i){var d=document.createElement('div');d.className='color-opt'+(i===0?' on':'');d.style.background=c;d.onclick=function(){cd.querySelectorAll('.color-opt').forEach(function(x){x.classList.remove('on')});d.classList.add('on')};cd.appendChild(d)})}else cs.style.display='none';

  // Sizes
  var sd=document.getElementById('popSizes'),ssec=document.getElementById('popSizesSec');sd.innerHTML='';
  if(prod.sizes&&prod.sizes.length){ssec.style.display='';prod.sizes.forEach(function(sz,i){var c=document.createElement('div');c.className='size-opt'+(i===0?' on':'');c.textContent=sz;c.onclick=function(){sd.querySelectorAll('.size-opt').forEach(function(x){x.classList.remove('on')});c.classList.add('on')};sd.appendChild(c)})}else ssec.style.display='none';

  // WA button
  document.getElementById('popWaBtn').onclick=function(){
    var sz=sd.querySelector('.size-opt.on');
    var msg='Bonjour WYK, je veux commander\u00a0: '+prod.name+(sz?' (Taille\u00a0: '+sz.textContent+')':'')+' \u2014 '+prod.price+'. Merci !';
    window.open('https://wa.me/50940300966?text='+encodeURIComponent(msg),'_blank');
  };

  // Similar products
  buildSimilar(cat,prodId);

  // Wish reset
  document.getElementById('wishBtn').classList.remove('on');

  // Show
  document.getElementById('productPopup').classList.add('on');
  document.getElementById('overlay').classList.add('on');
  document.body.style.overflow='hidden';
}

function buildGallery(prod){
  var imgs=prod.imgs&&prod.imgs.length?prod.imgs:[null];
  var track=document.getElementById('galleryTrack');
  var dots=document.getElementById('gallDots');
  track.innerHTML='';dots.innerHTML='';

  imgs.forEach(function(img,i){
    var slide=document.createElement('div');
    slide.className='pop-gallery-slide';
    if(img){slide.innerHTML='<img src="'+img+'" alt="'+prod.name+'">';slide.dataset.img=img}
    else{slide.innerHTML='<div class="pop-gallery-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>Image '+prod.name+'</span></div>'}
    track.appendChild(slide);

    var dot=document.createElement('div');
    dot.className='gdot'+(i===0?' on':'');
    dot.onclick=(function(n){return function(){galleryGoTo(n)}})(i);
    dots.appendChild(dot);
  });

  // Hide nav if single image
  var single=imgs.length<=1;
  document.getElementById('gallPrev').style.display=single?'none':'';
  document.getElementById('gallNext').style.display=single?'none':'';
  dots.style.display=single?'none':'';
  galleryGoTo(0);
}

function galleryGoTo(n){
  var imgs=currentProduct&&currentProduct.imgs?currentProduct.imgs:[null];
  var total=imgs.length;
  galleryIndex=((n%total)+total)%total;
  document.getElementById('galleryTrack').style.transform='translateX(-'+galleryIndex*100+'%)';
  document.querySelectorAll('.gdot').forEach(function(d,i){d.classList.toggle('on',i===galleryIndex)});
}
function gallerySlide(dir){galleryGoTo(galleryIndex+dir)}

function downloadCurrentImg(){
  var imgs=currentProduct&&currentProduct.imgs?currentProduct.imgs:[null];
  var img=imgs[galleryIndex];
  if(!img){showToast('Pas d\'image disponible');return}
  var a=document.createElement('a');a.href=img;a.download=currentProduct.name+'.jpg';a.click();
}

function buildSimilar(cat,excludeId){
  var sc=document.getElementById('similarScroll');sc.innerHTML='';
  var others=cat.products.filter(function(p){return p.id!==excludeId}).slice(0,6);
  if(!others.length){sc.innerHTML='<div style="font-size:.76rem;color:var(--t3);padding:4px">Pas d\'autres produits dans cette catégorie.</div>';return}
  others.forEach(function(p){
    var card=document.createElement('div');card.className='sim-card';
    card.innerHTML='<div class="sim-img">'+(p.imgs&&p.imgs[0]?'<img src="'+p.imgs[0]+'" alt="'+p.name+'">':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>')+'</div><div class="sim-body"><div class="sim-name">'+p.name+'</div><div class="sim-price">'+p.price+'</div></div>';
    card.onclick=function(){openProduct(p.id,cat.id)};
    sc.appendChild(card);
  });
}

function closePopup(){
  document.getElementById('productPopup').classList.remove('on');
  document.getElementById('overlay').classList.remove('on');
  document.body.style.overflow='';
  currentProduct=null;
}

function toggleWish(){
  var btn=document.getElementById('wishBtn');
  btn.classList.toggle('on');
  showToast(btn.classList.contains('on')?'Ajout\u00e9 aux favoris':'Retir\u00e9 des favoris');
}

/* ── COUNTDOWN ── */
var cdSecs=9257;
function updateCd(){
  cdSecs--;if(cdSecs<0)cdSecs=0;
  var h=Math.floor(cdSecs/3600),m=Math.floor((cdSecs%3600)/60),s=cdSecs%60;
  document.getElementById('cdH').textContent=String(h).padStart(2,'0');
  document.getElementById('cdM').textContent=String(m).padStart(2,'0');
  document.getElementById('cdS').textContent=String(s).padStart(2,'0');
}
setInterval(updateCd,1000);

/* ── INIT ── */
renderCats();

/* ── ESC ── */
document.addEventListener('keydown',function(e){if(e.key==='Escape')closePopup()});
</script>
</body>
</html>
