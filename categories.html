<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Catégories — WYK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#FAFAF8;--surface:#FFFFFF;--s2:#F5F5F3;--s3:#EDEDE9;
  --red:#E8192C;--red-d:#C0111F;--red-s:rgba(232,25,44,.08);
  --text:#0F0F0E;--t2:#44443C;--t3:#8A8A82;
  --bdr:rgba(0,0,0,.07);--bdr2:rgba(0,0,0,.13);
  --sh1:0 2px 8px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);
  --sh2:0 4px 20px rgba(0,0,0,.09),0 1px 4px rgba(0,0,0,.05);
  --sh3:0 16px 48px rgba(0,0,0,.13),0 4px 12px rgba(0,0,0,.07);
  --glass:rgba(250,250,248,.9);--gbdr:rgba(0,0,0,.06);
  --blur:blur(24px);--ease:.22s cubic-bezier(.4,0,.2,1)
}
[data-theme="dark"]{
  --bg:#0D0D0C;--surface:#161615;--s2:#1E1E1C;--s3:#262624;
  --text:#F2F2EC;--t2:#A0A098;--t3:#64645C;
  --bdr:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.13);
  --sh1:0 2px 8px rgba(0,0,0,.3),0 1px 3px rgba(0,0,0,.18);
  --sh2:0 4px 20px rgba(0,0,0,.42),0 1px 4px rgba(0,0,0,.22);
  --sh3:0 16px 48px rgba(0,0,0,.58),0 4px 12px rgba(0,0,0,.3);
  --glass:rgba(13,13,12,.9);--gbdr:rgba(255,255,255,.07);--red-s:rgba(232,25,44,.13)
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;padding-bottom:72px}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
svg{display:block;flex-shrink:0}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:90;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-bottom:1px solid var(--gbdr);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.h-left{display:flex;align-items:center;gap:8px}
.back-btn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text);transition:background var(--ease)}
.back-btn:hover{background:var(--s2)}
.back-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--text);letter-spacing:-.03em}
.logo em{font-style:normal;color:var(--red)}
.h-right{display:flex;align-items:center;gap:1px}
.hbtn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text);transition:background var(--ease);position:relative}
.hbtn:hover{background:var(--s2)}
.hbtn svg{width:18px;height:18px;stroke-width:1.8;stroke:currentColor;fill:none}
.cart-badge{position:absolute;top:5px;right:5px;width:14px;height:14px;border-radius:50%;background:var(--red);color:#fff;font-size:.48rem;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--surface)}
.theme-btn{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text);transition:background var(--ease),transform var(--ease)}
.theme-btn:hover{background:var(--s2);transform:rotate(18deg)}
.theme-btn svg{width:16px;height:16px;stroke-width:1.8;stroke:currentColor;fill:none}
.icon-sun{display:block}[data-theme="dark"] .icon-sun{display:none}
.icon-moon{display:none}[data-theme="dark"] .icon-moon{display:block}

/* ── SEARCH ── */
.search-wrap{padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--bdr)}
.search-bar{display:flex;align-items:center;gap:9px;background:var(--s2);border:1.5px solid var(--bdr);border-radius:13px;padding:11px 14px;transition:border-color var(--ease),box-shadow var(--ease)}
.search-bar.active{border-color:var(--red);box-shadow:0 0 0 3px var(--red-s);background:var(--surface)}
.search-bar svg{width:17px;height:17px;stroke:var(--t3);stroke-width:2;fill:none;flex-shrink:0;transition:stroke var(--ease)}
.search-bar.active svg.si{stroke:var(--red)}
.search-bar input{flex:1;background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:.92rem;color:var(--text)}
.search-bar input::placeholder{color:var(--t3)}
.s-clear{color:var(--t3);opacity:0;pointer-events:none;transition:opacity var(--ease)}
.s-clear.show{opacity:1;pointer-events:all}
.s-clear svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none}
.search-info{font-size:.72rem;color:var(--t3);margin-top:7px;display:none}
.search-info.show{display:block}
.search-info em{color:var(--red);font-style:normal;font-weight:700}

/* ── FILTER CHIPS ── */
.filter-row{display:flex;gap:7px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--bdr)}
.filter-row::-webkit-scrollbar{display:none}
.fchip{display:inline-flex;align-items:center;gap:5px;background:var(--s2);border:1.5px solid var(--bdr);border-radius:100px;padding:7px 13px;font-size:.76rem;font-weight:600;color:var(--t2);white-space:nowrap;cursor:pointer;flex-shrink:0;transition:all var(--ease)}
.fchip:hover{border-color:var(--red);color:var(--red);background:var(--red-s)}
.fchip.on{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 2px 8px rgba(232,25,44,.24)}

/* ── PAGE HEAD ── */
.page-head{padding:18px 16px 12px}
.page-head h1{font-family:'Syne',sans-serif;font-size:1.45rem;font-weight:800;color:var(--text);letter-spacing:-.03em;margin-bottom:3px}
.page-head h1 em{font-style:normal;color:var(--red)}
.page-head p{font-size:.81rem;color:var(--t3)}

/* ── RESULTS BAR ── */
.results-bar{padding:0 16px 10px;display:none;align-items:center;justify-content:space-between}
.results-bar.show{display:flex}
.results-txt{font-size:.78rem;color:var(--t2)}
.results-txt strong{color:var(--text);font-weight:700}
.results-clear{font-size:.76rem;font-weight:700;color:var(--red)}

/* ── LOADING ── */
.loading-page{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px}
.spinner{width:28px;height:28px;border:2.5px solid var(--bdr2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-page p{font-size:.82rem;color:var(--t3)}

/* ── CATS LIST ── */
.cats-list{padding:0 16px;display:flex;flex-direction:column;gap:12px;padding-bottom:20px}

.cat-section{border-radius:22px;overflow:hidden;border:1px solid var(--bdr);background:var(--surface);box-shadow:var(--sh1);transition:box-shadow var(--ease),border-color var(--ease)}
.cat-section.open{box-shadow:var(--sh2);border-color:var(--bdr2)}

.cat-header{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer;transition:background var(--ease);user-select:none;position:relative}
.cat-header:active{background:var(--s2)}
.cat-section.open .cat-header::before{content:'';position:absolute;left:0;top:15%;bottom:15%;width:3px;border-radius:0 3px 3px 0;background:var(--cat-color,var(--red))}

.cat-header-ico{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform var(--ease),box-shadow var(--ease)}
.cat-section.open .cat-header-ico{transform:scale(1.06);box-shadow:0 4px 14px rgba(0,0,0,.12)}
.cat-header-ico svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.8;fill:none}

.cat-header-info{flex:1;min-width:0}
.cat-header-name{font-family:'Syne',sans-serif;font-size:.96rem;font-weight:800;color:var(--text);letter-spacing:-.01em;margin-bottom:2px}
.cat-header-sub{font-size:.7rem;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.cat-count-badge{border-radius:100px;padding:4px 11px;font-size:.64rem;font-weight:700;flex-shrink:0;background:var(--s2);color:var(--t2);border:1px solid var(--bdr);transition:all var(--ease)}
.cat-section.open .cat-count-badge{background:var(--red-s);border-color:rgba(232,25,44,.16);color:var(--red)}

.cat-chevron{color:var(--t3);flex-shrink:0;transition:transform .3s ease,color var(--ease)}
.cat-chevron svg{width:17px;height:17px;stroke:currentColor;stroke-width:2;fill:none}
.cat-section.open .cat-chevron{transform:rotate(180deg);color:var(--red)}

.cat-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
.cat-section.open .cat-body{max-height:1200px}
.cat-body-inner{border-top:1px solid var(--bdr);padding:14px 0 16px}

/* ── PRODUCT SCROLL ── */
.prod-scroll{display:flex;gap:10px;padding:2px 16px 4px;overflow-x:auto;scrollbar-width:none}
.prod-scroll::-webkit-scrollbar{display:none}

.prod-card{width:152px;flex-shrink:0;background:var(--bg);border:1px solid var(--bdr);border-radius:18px;overflow:hidden;cursor:pointer;transition:transform var(--ease),box-shadow var(--ease),border-color var(--ease)}
.prod-card:hover{transform:translateY(-4px);box-shadow:var(--sh3);border-color:var(--bdr2)}
.prod-card:active{transform:scale(.97)}

.prod-img{width:100%;height:116px;background:var(--s2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.prod-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s ease}
.prod-card:hover .prod-img img{transform:scale(1.05)}
.prod-img-ph{display:flex;flex-direction:column;align-items:center;gap:5px;width:100%;height:100%}
.prod-img-ph svg{width:30px;height:30px;stroke:var(--bdr2);stroke-width:1.4;fill:none}
.prod-img-ph span{font-size:.58rem;color:var(--t3);font-weight:600}

.prod-badge{position:absolute;top:8px;left:8px;border-radius:7px;padding:3px 8px;font-size:.58rem;font-weight:800;letter-spacing:.04em}
.badge-new{background:var(--red);color:#fff}
.badge-promo{background:#f59e0b;color:#fff}
.badge-pop{background:#8b5cf6;color:#fff}

.prod-stock-dot{position:absolute;bottom:8px;right:8px;width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(255,255,255,.8)}
.stock-ok{background:#22c55e}.stock-low{background:#f59e0b}.stock-out{background:#ef4444}

.prod-body{padding:10px 11px 11px;background:var(--surface)}
.prod-name{font-size:.79rem;font-weight:700;color:var(--text);margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.35}
.prod-price-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.prod-price{font-family:'Syne',sans-serif;font-size:.86rem;font-weight:800;color:var(--red)}
.prod-old{font-size:.64rem;color:var(--t3);text-decoration:line-through}

mark{background:rgba(232,25,44,.15);color:var(--red);border-radius:3px;padding:0 2px;font-weight:700}

.cat-empty{display:flex;flex-direction:column;align-items:center;padding:28px 16px;text-align:center;gap:8px}
.cat-empty svg{width:32px;height:32px;stroke:var(--bdr2);stroke-width:1.4;fill:none}
.cat-empty p{font-size:.77rem;color:var(--t3);line-height:1.6}

/* ── POPUP ── */
.pop-ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .26s}
.pop-ov.on{opacity:1;pointer-events:all}
.pop-sheet{background:var(--surface);border-radius:28px 28px 0 0;width:100%;max-width:640px;max-height:96vh;overflow-y:auto;scrollbar-width:none;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,0,.18,1);box-shadow:0 -16px 60px rgba(0,0,0,.2);position:relative}
.pop-sheet::-webkit-scrollbar{display:none}
.pop-ov.on .pop-sheet{transform:translateY(0)}
.pop-handle{width:36px;height:4px;border-radius:2px;background:var(--bdr2);margin:13px auto 0}
.pop-close{position:absolute;top:13px;right:14px;z-index:10;width:30px;height:30px;border-radius:50%;background:var(--s2);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;transition:background var(--ease)}
.pop-close:hover{background:var(--s3)}
.pop-close svg{width:13px;height:13px;stroke:var(--t2);stroke-width:2.5;fill:none}

/* Gallery */
.pop-gallery{margin:12px 14px 0;border-radius:20px;overflow:hidden;background:var(--s2);position:relative}
.gall-track{display:flex;transition:transform .34s cubic-bezier(.4,0,.2,1)}
.gall-slide{min-width:100%;height:240px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.gall-slide img{width:100%;height:100%;object-fit:cover}
.gall-ph{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px;width:100%;height:100%}
.gall-ph svg{width:44px;height:44px;stroke:var(--bdr2);stroke-width:1.3;fill:none}
.gall-ph span{font-size:.74rem;color:var(--t3);font-weight:600;text-align:center}
.gall-prev,.gall-next{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--gbdr);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;color:var(--text);box-shadow:var(--sh1);transition:all var(--ease)}
.gall-prev{left:10px}.gall-next{right:10px}
.gall-prev:hover,.gall-next:hover{background:var(--surface);box-shadow:var(--sh2)}
.gall-prev svg,.gall-next svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.5;fill:none}
.gall-dots{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
.gdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;transition:all var(--ease)}
.gdot.on{background:#fff;width:18px;border-radius:3px}

/* Pop content */
.pop-content{padding:14px 18px 0}
.pop-top-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px}
.pop-cat-badge{display:inline-flex;align-items:center;gap:5px;background:var(--red-s);border:1px solid rgba(232,25,44,.14);border-radius:100px;padding:4px 11px;font-size:.65rem;font-weight:700;color:var(--red)}
.pop-stock-badge{display:inline-flex;align-items:center;gap:4px;font-size:.65rem;font-weight:700;padding:4px 10px;border-radius:100px}
.stock-ok-badge{background:rgba(34,197,94,.1);color:#16a34a}
.stock-low-badge{background:rgba(245,158,11,.1);color:#d97706}
.stock-out-badge{background:rgba(239,68,68,.1);color:#ef4444}
.pop-stock-badge svg{width:11px;height:11px;stroke:currentColor;stroke-width:2.5;fill:none}
.pop-title{font-family:'Syne',sans-serif;font-size:1.18rem;font-weight:800;color:var(--text);letter-spacing:-.02em;margin-bottom:8px;line-height:1.2}
.pop-price-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.pop-price{font-family:'Syne',sans-serif;font-size:1.45rem;font-weight:800;color:var(--red)}
.pop-old{font-size:.86rem;color:var(--t3);text-decoration:line-through}
.pop-disc{background:rgba(34,197,94,.12);color:#16a34a;border-radius:7px;padding:3px 9px;font-size:.7rem;font-weight:800}
.pop-desc{font-size:.84rem;color:var(--t2);line-height:1.72;margin-bottom:14px}

.opt-title{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:8px}
.specs-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.spec-item{background:var(--s2);border:1px solid var(--bdr);border-radius:11px;padding:9px 11px}
.spec-lbl{font-size:.59rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);margin-bottom:2px}
.spec-val{font-size:.81rem;font-weight:600;color:var(--text)}

.colors-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform var(--ease),border-color var(--ease)}
.color-opt:hover{transform:scale(1.12)}
.color-opt.on{border-color:var(--text);transform:scale(1.15)}

.sizes-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.size-opt{padding:7px 14px;border-radius:100px;border:1.5px solid var(--bdr);color:var(--t2);font-size:.77rem;font-weight:600;cursor:pointer;transition:all var(--ease)}
.size-opt:hover,.size-opt.on{border-color:var(--red);color:var(--red);background:var(--red-s)}

.pop-actions{display:flex;gap:8px;padding:0 18px}
.btn-cart{flex:1;background:var(--red);color:#fff;padding:14px;border-radius:14px;font-weight:700;font-size:.9rem;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 4px 16px rgba(232,25,44,.24);transition:background var(--ease),transform var(--ease)}
.btn-cart svg{width:17px;height:17px;stroke:#fff;stroke-width:2.2;fill:none}
.btn-cart:hover{background:var(--red-d);transform:translateY(-1px)}
.btn-wish{width:50px;height:50px;border-radius:14px;background:var(--s2);border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;transition:all var(--ease)}
.btn-wish svg{width:18px;height:18px;stroke:var(--t2);stroke-width:2;fill:none}
.btn-wish:hover{border-color:var(--red);background:var(--red-s)}
.btn-wish.on svg{stroke:var(--red);fill:var(--red)}
.btn-wa{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;background:#25D366;color:#fff;padding:13px;border-radius:14px;font-weight:700;font-size:.9rem;margin:8px 0 0;transition:transform var(--ease),box-shadow var(--ease)}
.btn-wa svg{width:17px;height:17px}
.btn-wa:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,211,102,.35)}
.pop-wa-wrap{padding:0 18px}
.pop-divider{height:1px;background:var(--bdr);margin:18px 18px 0}
.pop-similar{padding:14px 18px 34px}
.sim-title{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:800;color:var(--text);margin-bottom:12px}
.sim-title em{color:var(--red);font-style:normal}
.sim-scroll{display:flex;gap:9px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.sim-scroll::-webkit-scrollbar{display:none}
.sim-card{width:132px;flex-shrink:0;background:var(--s2);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform var(--ease),box-shadow var(--ease)}
.sim-card:hover{transform:translateY(-3px);box-shadow:var(--sh2)}
.sim-img{width:100%;height:92px;background:var(--s3);display:flex;align-items:center;justify-content:center;overflow:hidden}
.sim-img img{width:100%;height:100%;object-fit:cover}
.sim-img svg{width:24px;height:24px;stroke:var(--bdr2);stroke-width:1.4;fill:none}
.sim-body{padding:8px 9px 10px;background:var(--surface)}
.sim-name{font-size:.73rem;font-weight:700;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sim-price{font-family:'Syne',sans-serif;font-size:.79rem;font-weight:800;color:var(--red)}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:80;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-top:1px solid var(--gbdr);display:flex;height:58px;padding:0 6px}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--t3);text-decoration:none;font-size:.55rem;font-weight:600;border-radius:11px;margin:4px 2px;transition:color var(--ease),background var(--ease)}
.bni svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.7;fill:none}
.bni:hover{color:var(--text);background:var(--s2)}
.bni.on{color:var(--red)}
.bni.on svg{stroke-width:2.2}

/* ── TOAST ── */
.toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);padding:9px 15px;border-radius:100px;font-size:.79rem;font-weight:500;opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;white-space:nowrap;z-index:500;box-shadow:var(--sh2);display:flex;align-items:center;gap:6px}
.toast svg{width:13px;height:13px;stroke:#22c55e;stroke-width:2.5;fill:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.a1{animation:fu .3s ease both}.a2{animation:fu .3s .06s ease both}
@media(min-width:640px){.gall-slide{height:290px}.prod-card{width:168px}.prod-img{height:130px}}
@media(min-width:900px){.bnav{display:none}body{padding-bottom:0}.cats-list,.page-head,.results-bar{max-width:860px;margin-left:auto;margin-right:auto}}
</style>
</head>
<body>

<header>

<!-- SEARCH -->

    Tout

<!-- PAGE HEAD -->
<div class="page-head a1">

</div>

<!-- RESULTS BAR -->
<div class="results-bar" id="resultsBar">

</div>

<!-- CATEGORIES LIST -->
<div class="cats-list a2" id="catsList">

</div>

<!-- POPUP PRODUIT -->
<div class="pop-ov" id="productPopup">
  <div class="pop-sheet">
    <div class="pop-handle"></div>

        <svg viewBox="0 0 24 24"><path stroke-linecap="round" d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path stroke-linecap="round" d="M16 10a4 4 0 01-8 0"/></svg>
        Ajouter au panier
      </button>
      <button class="btn-wish" id="wishBtn" onclick="toggleWish()">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
      </button>
    </div>
    <div class="pop-wa-wrap">
      <button class="btn-wa" id="popWaBtn">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Commander sur WhatsApp
      </button>
    </div>
    <div class="pop-divider"></div>
    <div class="pop-similar">
      <div class="sim-title">Produits <em>similaires</em></div>
      <div class="sim-scroll" id="simScroll"></div>
    </div>
  </div>
</div>

<nav class="bnav">
  <a class="bni" href="index.html"><svg viewBox="0 0 24 24"><path stroke-linecap="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Accueil</a>
  <a class="bni on" href="#"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>Catégories</a>
  <a class="bni" href="#"><svg viewBox="0 0 24 24"><path stroke-linecap="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/></svg>Offres</a>
  <a class="bni" href="compte.html"><svg viewBox="0 0 24 24"><path stroke-linecap="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>Compte</a>
</nav>

<div class="toast" id="toastEl"><svg viewBox="0 0 24 24"><path stroke-linecap="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><span id="toastMsg"></span></div>

<script>
/* ══════════════════════
   SUPABASE CONFIG
══════════════════════ */
const SUPA_URL = 'https://byrklytqoucdskzvcoau.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5cmtseXRxb3VjZHNrenZjb2F1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTQ0ODcsImV4cCI6MjA5NDI3MDQ4N30.nH7LKYevuBd9jGmFmv7KMNoJu3X_rDaY1BHXZR1v3wM';
const WA_NUMBER = '50940300966';
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

/* ══════════════════════
   STATE
══════════════════════ */
var allCats = [];      // [{...cat, products:[...]}]
var activeFilter = 'all';
var searchVal = '';
var curProd = null;
var curCat = null;
var gallIdx = 0;
var cartCount = 0;
var searchTimeout = null;

/* ══════════════════════
   THEME
══════════════════════ */
function toggleTheme() {
  var h = document.documentElement, dark = h.getAttribute('data-theme') === 'dark';
  h.setAttribute('data-theme', dark ? 'light' : 'dark');
  localStorage.setItem('wyk-theme', dark ? 'light' : 'dark');
}
(function () {
  var t = localStorage.getItem('wyk-theme');
  if (t) document.documentElement.setAttribute('data-theme', t);
})();

/* ══════════════════════
   TOAST
══════════════════════ */
var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toastEl');
  document.getElementById('toastMsg').textContent = msg;
  el.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { el.classList.remove('on'); }, 2400);
}

/* ══════════════════════
   LOAD DATA FROM SUPABASE
══════════════════════ */
async function loadData() {
  // Charger catégories
  var { data: cats, error: catErr } = await db
    .from('categories')
    .select('*')
    .eq('active', true)
    .order('name');

  if (catErr || !cats || !cats.length) {
    document.getElementById('catsList').innerHTML =
      '<div class="loading-page"><svg viewBox="0 0 24 24" fill="none" stroke="var(--t3)" stroke-width="1.4" style="width:40px;height:40px"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 8v4m0 4h.01"/></svg><p>Aucune catégorie disponible pour l\'instant.</p></div>';
    return;
  }

  // Charger tous les produits actifs avec leurs images
  var { data: prods, error: prodErr } = await db
    .from('products')
    .select('*, product_images(url, position)')
    .eq('active', true)
    .order('created_at', { ascending: false });

  var products = prods || [];

  // Associer produits aux catégories
  allCats = cats.map(function (cat) {
    var catProds = products.filter(function (p) {
      return p.category_id === cat.id;
    }).map(function (p) {
      var imgs = (p.product_images || [])
        .sort(function (a, b) { return a.position - b.position })
        .map(function (i) { return i.url; });
      return Object.assign({}, p, { imgs: imgs });
    });
    return Object.assign({}, cat, { products: catProds });
  });

  buildFilterChips();
  renderAll();
}

/* ══════════════════════
   BUILD FILTER CHIPS
══════════════════════ */
function buildFilterChips() {
  var row = document.getElementById('filterRow');
  // Garder le chip "Tout" existant, ajouter les catégories
  allCats.forEach(function (cat) {
    var btn = document.createElement('button');
    btn.className = 'fchip';
    btn.dataset.catId = cat.id;
    // Icône SVG de la catégorie ou icône par défaut
    var svgContent = cat.svg_icon ||
      '<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>';
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px">' + svgContent + '</svg>' + escHtml(cat.name);
    btn.onclick = function () { setFilter(btn, cat.id); };
    row.appendChild(btn);
  });
}

/* ══════════════════════
   FILTER
══════════════════════ */
function setFilter(btn, f) {
  document.querySelectorAll('.fchip').forEach(function (c) { c.classList.remove('on'); });
  btn.classList.add('on');
  activeFilter = f;
  renderAll();
}

/* ══════════════════════
   SEARCH
══════════════════════ */
function onSearch(v) {
  clearTimeout(searchTimeout);
  searchVal = v;
  document.getElementById('searchBar').classList.toggle('active', v.length > 0);
  document.getElementById('sClear').classList.toggle('show', v.length > 0);
  searchTimeout = setTimeout(function () { renderAll(); updateResultsBar(); }, 150);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  searchVal = '';
  document.getElementById('searchBar').classList.remove('active');
  document.getElementById('sClear').classList.remove('show');
  document.getElementById('searchInfo').classList.remove('show');
  document.getElementById('resultsBar').classList.remove('show');
  renderAll();
}

function updateResultsBar() {
  if (!searchVal) { document.getElementById('resultsBar').classList.remove('show'); return; }
  var total = 0;
  getVisibleCats().forEach(function (cat) {
    total += cat.products.filter(function (p) { return matchProd(p, searchVal.toLowerCase()); }).length;
  });
  document.getElementById('resultCount').textContent = total;
  document.getElementById('resultsBar').classList.add('show');
  var si = document.getElementById('searchInfo');
  si.innerHTML = '<em>' + total + '</em> résultat' + (total > 1 ? 's' : '') + ' pour "<em>' + escHtml(searchVal) + '</em>"';
  si.classList.add('show');
}

function getVisibleCats() {
  return allCats.filter(function (cat) {
    return activeFilter === 'all' || cat.id === activeFilter;
  });
}

function matchProd(p, q) {
  if (!q) return true;
  if (p.name && p.name.toLowerCase().includes(q)) return true;
  if (p.description && p.description.toLowerCase().includes(q)) return true;
  if (p.badge && p.badge.toLowerCase().includes(q)) return true;
  if (p.sizes && p.sizes.some(function (s) { return s.toLowerCase().includes(q); })) return true;
  return false;
}

function matchCat(cat, q) {
  if (!q) return true;
  if (cat.name.toLowerCase().includes(q)) return true;
  if (cat.description && cat.description.toLowerCase().includes(q)) return true;
  return cat.products.some(function (p) { return matchProd(p, q); });
}

/* ══════════════════════
   RENDER
══════════════════════ */
function renderAll() {
  var list = document.getElementById('catsList');
  list.innerHTML = '';
  var q = searchVal.toLowerCase();
  var visibleCats = getVisibleCats().filter(function (cat) { return !q || matchCat(cat, q); });

  if (!visibleCats.length) {
    list.innerHTML = '<div style="text-align:center;padding:48px 20px">'
      + '<svg viewBox="0 0 24 24" fill="none" stroke="var(--t3)" stroke-width="1.4" style="width:48px;height:48px;margin:0 auto 12px"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/></svg>'
      + '<div style="font-family:Syne,sans-serif;font-size:.95rem;font-weight:800;color:var(--t2);margin-bottom:6px">Aucun résultat</div>'
      + '<div style="font-size:.79rem;color:var(--t3)">Essaie avec d\'autres mots-clés</div>'
      + (searchVal ? '<button onclick="clearSearch()" style="margin-top:14px;background:var(--red);color:#fff;padding:10px 20px;border-radius:10px;font-weight:700;font-size:.82rem;font-family:DM Sans,sans-serif">Effacer</button>' : '')
      + '</div>';
    return;
  }

  visibleCats.forEach(function (cat) {
    var filteredProds = cat.products.filter(function (p) { return !q || matchProd(p, q); });
    var catColor = cat.color || '#E8192C';
    var catColorText = cat.color_text || catColor;

    var sec = document.createElement('div');
    sec.className = 'cat-section' + (q && filteredProds.length > 0 ? ' open' : '');
    sec.dataset.id = cat.id;
    sec.style.setProperty('--cat-color', catColor);

    // SVG icon (admin peut coller son SVG)
    var svgInner = cat.svg_icon ||
      '<path stroke-linecap="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>';

    var headerHtml = '<div class="cat-header" onclick="toggleCat(\'' + cat.id + '\')">'
      + '<div class="cat-header-ico" style="background:' + catColor + '22;color:' + catColorText + '">'
      + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">' + svgInner + '</svg>'
      + '</div>'
      + '<div class="cat-header-info">'
      + '<div class="cat-header-name">' + (q ? highlight(cat.name, q) : escHtml(cat.name)) + '</div>'
      + '<div class="cat-header-sub">' + escHtml(cat.description || cat.name) + '</div>'
      + '</div>'
      + '<span class="cat-count-badge">' + filteredProds.length + ' produit' + (filteredProds.length > 1 ? 's' : '') + '</span>'
      + '<div class="cat-chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M19 9l-7 7-7-7"/></svg></div>'
      + '</div>';

    var bodyHtml = '<div class="cat-body"><div class="cat-body-inner">';
    if (!filteredProds.length) {
      bodyHtml += '<div class="cat-empty">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path stroke-linecap="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
        + '<p>Aucun produit dans cette catégorie pour l\'instant.</p>'
        + '</div>';
    } else {
      bodyHtml += '<div class="prod-scroll">';
      filteredProds.forEach(function (p) {
        var imgSrc = p.imgs && p.imgs[0] ? p.imgs[0] : null;
        var badgeMap = { new: 'NOUVEAU', promo: 'PROMO', pop: '⭐' };
        var badgeHtml = p.badge && badgeMap[p.badge]
          ? '<span class="prod-badge badge-' + p.badge + '">' + badgeMap[p.badge] + '</span>' : '';
        var stockClass = p.stock > 5 ? 'stock-ok' : p.stock > 0 ? 'stock-low' : 'stock-out';
        var imgHtml = imgSrc
          ? '<img src="' + imgSrc + '" alt="' + escHtml(p.name) + '" loading="lazy">'
          : '<div class="prod-img-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>Photo</span></div>';
        var oldPriceHtml = p.old_price ? '<span class="prod-old">' + formatPrice(p.old_price) + '</span>' : '';
        bodyHtml += '<div class="prod-card" onclick="openProd(\'' + p.id + '\',\'' + cat.id + '\')">'
          + '<div class="prod-img">' + imgHtml + badgeHtml + '<div class="prod-stock-dot ' + stockClass + '"></div></div>'
          + '<div class="prod-body">'
          + '<div class="prod-name">' + (q ? highlight(p.name, q) : escHtml(p.name)) + '</div>'
          + '<div class="prod-price-row"><span class="prod-price">' + formatPrice(p.price) + '</span>' + oldPriceHtml + '</div>'
          + '</div></div>';
      });
      bodyHtml += '</div>';
    }
    bodyHtml += '</div></div>';
    sec.innerHTML = headerHtml + bodyHtml;
    list.appendChild(sec);
  });
}

function toggleCat(id) {
  var sec = document.querySelector('[data-id="' + id + '"]');
  if (sec) sec.classList.toggle('open');
}

/* ══════════════════════
   PRODUCT POPUP
══════════════════════ */
function openProd(pid, catId) {
  var cat = allCats.find(function (c) { return c.id === catId; });
  if (!cat) return;
  var prod = cat.products.find(function (p) { return p.id === pid; });
  if (!prod) return;
  curProd = prod; curCat = cat; gallIdx = 0;

  // Gallery
  buildGallery(prod);

  // Info
  document.getElementById('popCat').textContent = cat.name;
  document.getElementById('popTitle').textContent = prod.name;
  document.getElementById('popPrice').textContent = formatPrice(prod.price);
  document.getElementById('popOld').textContent = prod.old_price ? formatPrice(prod.old_price) : '';

  // Discount
  var de = document.getElementById('popDisc');
  if (prod.price && prod.old_price && Number(prod.old_price) > Number(prod.price)) {
    var disc = Math.round((1 - Number(prod.price) / Number(prod.old_price)) * 100);
    de.textContent = '-' + disc + '%'; de.style.display = '';
  } else de.style.display = 'none';

  document.getElementById('popDesc').textContent = prod.description || '';

  // Stock
  var sb = document.getElementById('popStock');
  if (prod.stock <= 0) {
    sb.className = 'pop-stock-badge stock-out-badge';
    sb.innerHTML = '<svg viewBox="0 0 24 24"><path stroke-linecap="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Rupture de stock';
  } else if (prod.stock <= 5) {
    sb.className = 'pop-stock-badge stock-low-badge';
    sb.innerHTML = '<svg viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>Stock limité';
  } else {
    sb.className = 'pop-stock-badge stock-ok-badge';
    sb.innerHTML = '<svg viewBox="0 0 24 24"><path stroke-linecap="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>En stock';
  }

  // Specs (depuis le champ specs JSON)
  var sg = document.getElementById('specsGrid'), ss = document.getElementById('specsSec');
  sg.innerHTML = '';
  var specs = prod.specs || [];
  if (typeof specs === 'string') { try { specs = JSON.parse(specs); } catch(e) { specs = []; } }
  if (specs.length) {
    ss.style.display = '';
    specs.forEach(function (s) {
      var d = document.createElement('div'); d.className = 'spec-item';
      d.innerHTML = '<div class="spec-lbl">' + escHtml(s.l || s.label || '') + '</div><div class="spec-val">' + escHtml(s.v || s.value || '') + '</div>';
      sg.appendChild(d);
    });
  } else ss.style.display = 'none';

  // Colors
  var cr = document.getElementById('colorsRow'), cs = document.getElementById('colorsSec');
  cr.innerHTML = '';
  var colors = prod.colors || [];
  if (colors.length) {
    cs.style.display = '';
    colors.forEach(function (c, i) {
      var d = document.createElement('div');
      d.className = 'color-opt' + (i === 0 ? ' on' : '');
      d.style.background = c; d.title = c;
      d.onclick = function () {
        cr.querySelectorAll('.color-opt').forEach(function (x) { x.classList.remove('on'); });
        d.classList.add('on');
      };
      cr.appendChild(d);
    });
  } else cs.style.display = 'none';

  // Sizes
  var sr = document.getElementById('sizesRow'), ss2 = document.getElementById('sizesSec');
  sr.innerHTML = '';
  var sizes = prod.sizes || [];
  if (sizes.length) {
    ss2.style.display = '';
    sizes.forEach(function (sz, i) {
      var c = document.createElement('div');
      c.className = 'size-opt' + (i === 0 ? ' on' : '');
      c.textContent = sz;
      c.onclick = function () {
        sr.querySelectorAll('.size-opt').forEach(function (x) { x.classList.remove('on'); });
        c.classList.add('on');
      };
      sr.appendChild(c);
    });
  } else ss2.style.display = 'none';

  // WA button
  document.getElementById('popWaBtn').onclick = function () {
    var sz = sr.querySelector('.size-opt.on');
    var msg = 'Bonjour WYK 👋, je veux commander : *' + prod.name + '*'
      + (sz ? ' — Option : ' + sz.textContent : '')
      + ' — Prix : ' + formatPrice(prod.price)
      + '\n\nMerci !';
    window.open('https://wa.me/' + WA_NUMBER + '?text=' + encodeURIComponent(msg), '_blank');
  };

  // Similar
  buildSimilar(cat, pid);
  document.getElementById('wishBtn').classList.remove('on');
  document.getElementById('productPopup').classList.add('on');
  document.body.style.overflow = 'hidden';
}

function buildGallery(prod) {
  var imgs = prod.imgs && prod.imgs.length ? prod.imgs : [null];
  var track = document.getElementById('gallTrack'), dots = document.getElementById('gallDots');
  track.innerHTML = ''; dots.innerHTML = '';
  imgs.forEach(function (img, i) {
    var s = document.createElement('div'); s.className = 'gall-slide';
    if (img) { s.innerHTML = '<img src="' + img + '" alt="' + escHtml(prod.name) + '" loading="lazy">'; s.dataset.img = img; }
    else { s.innerHTML = '<div class="gall-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>' + escHtml(prod.name) + '</span></div>'; }
    track.appendChild(s);
    if (imgs.length > 1) {
      var dot = document.createElement('div'); dot.className = 'gdot' + (i === 0 ? ' on' : '');
      dot.onclick = (function (n) { return function () { gallGoTo(n); }; })(i);
      dots.appendChild(dot);
    }
  });
  var single = imgs.length <= 1;
  document.getElementById('gallPrev').style.display = single ? 'none' : '';
  document.getElementById('gallNext').style.display = single ? 'none' : '';
  gallGoTo(0);
}

function gallGoTo(n) {
  var len = curProd && curProd.imgs && curProd.imgs.length ? curProd.imgs.length : 1;
  gallIdx = ((n % len) + len) % len;
  document.getElementById('gallTrack').style.transform = 'translateX(-' + gallIdx * 100 + '%)';
  document.querySelectorAll('.gdot').forEach(function (d, i) { d.classList.toggle('on', i === gallIdx); });
}
function gallSlide(dir) { gallGoTo(gallIdx + dir); }

function buildSimilar(cat, excludeId) {
  var sc = document.getElementById('simScroll'); sc.innerHTML = '';
  var others = cat.products.filter(function (p) { return p.id !== excludeId; });
  if (!others.length) { sc.innerHTML = '<div style="font-size:.76rem;color:var(--t3);padding:4px">Pas d\'autres produits.</div>'; return; }
  others.slice(0, 6).forEach(function (p) {
    var c = document.createElement('div'); c.className = 'sim-card';
    var imgH = p.imgs && p.imgs[0]
      ? '<img src="' + p.imgs[0] + '" alt="' + escHtml(p.name) + '" loading="lazy">'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>';
    c.innerHTML = '<div class="sim-img">' + imgH + '</div><div class="sim-body"><div class="sim-name">' + escHtml(p.name) + '</div><div class="sim-price">' + formatPrice(p.price) + '</div></div>';
    c.onclick = function () { openProd(p.id, cat.id); };
    sc.appendChild(c);
  });
}

function closePopup() {
  document.getElementById('productPopup').classList.remove('on');
  document.body.style.overflow = '';
  curProd = null;
}

function addToCart() {
  cartCount++;
  document.getElementById('cartBadge').textContent = cartCount;
  showToast('Ajouté au panier !');
  closePopup();
}

function toggleWish() {
  var b = document.getElementById('wishBtn'); b.classList.toggle('on');
  showToast(b.classList.contains('on') ? 'Ajouté aux favoris ❤️' : 'Retiré des favoris');
}

/* ══════════════════════
   UTILS
══════════════════════ */
function formatPrice(n) {
  if (!n) return '—';
  return Number(n).toLocaleString('fr') + ' HTG';
}

function escHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function highlight(text, q) {
  if (!q || !text) return escHtml(text || '');
  var esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(text).replace(new RegExp('(' + esc + ')', 'gi'), '<mark>$1</mark>');
}

/* ══════════════════════
   INIT
══════════════════════ */
loadData();

document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closePopup(); });
document.getElementById('productPopup').addEventListener('click', function (e) {
  if (e.target === this) closePopup();
});
</script>
